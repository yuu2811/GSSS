<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A1628">
    <meta name="description" content="GSSS - 日本株式プロフェッショナル分析ツール。10種類の投資銀行スタイル分析エンジンで日本株を徹底分析。">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GSSS - 日本株式プロフェッショナル分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gs-navy': '#003A70',
                        'gs-gold': '#B5985A',
                        'gs-dark': '#0A1628',
                        'gs-card': '#111D33',
                        'gs-border': '#1E3050',
                        'gs-text': '#C8D6E5',
                        'gs-accent': '#4A9EFF',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; -webkit-font-smoothing: antialiased; }
        .loader { border: 3px solid #1E3050; border-top: 3px solid #4A9EFF; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .analyzer-card { transition: all 0.15s ease; }
        .analyzer-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(74, 158, 255, 0.12); }
        .analyzer-card:active { transform: scale(0.98); }
        .score-bar { transition: width 1s ease-out; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0A1628; }
        ::-webkit-scrollbar-thumb { background: #1E3050; border-radius: 2px; }
        /* スマホ用タッチ最適化 */
        @media (max-width: 640px) {
            .analyzer-card { min-height: 80px; }
            input, select, button { font-size: 16px !important; /* iOS zoom防止 */ }
        }
        /* セーフエリア対応 */
        body { padding-bottom: env(safe-area-inset-bottom); }
        header { padding-top: env(safe-area-inset-top); }
    </style>
</head>
<body class="bg-gs-dark text-gs-text min-h-screen">

<!-- ヘッダー -->
<header class="bg-gs-navy/80 backdrop-blur-md border-b border-gs-border sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-3 sm:px-4 py-2.5 sm:py-3 flex items-center justify-between">
        <div class="flex items-center gap-2 sm:gap-3">
            <div class="w-7 h-7 sm:w-8 sm:h-8 bg-gs-gold rounded flex items-center justify-center text-gs-dark font-bold text-xs sm:text-sm flex-shrink-0">GS</div>
            <div>
                <h1 class="text-white font-semibold text-base sm:text-lg leading-tight">GSSS</h1>
                <p class="text-gs-text/60 text-[10px] sm:text-xs hidden sm:block">Goldman Sachs Style Stock Screener</p>
            </div>
        </div>
        <div class="text-gs-text/60 text-[10px] sm:text-xs text-right">日本株式<br class="sm:hidden">プロフェッショナル分析</div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-8">

    <!-- 銘柄入力 -->
    <section class="mb-6 sm:mb-10">
        <div class="bg-gs-card border border-gs-border rounded-xl p-4 sm:p-6">
            <h2 class="text-white font-semibold text-base sm:text-lg mb-3 sm:mb-4">銘柄を入力</h2>
            <div class="flex gap-2 sm:gap-4 items-end">
                <div class="flex-1">
                    <label class="block text-xs sm:text-sm text-gs-text/70 mb-1">銘柄コード</label>
                    <input type="text" id="tickerInput" inputmode="numeric" autocomplete="off"
                        class="w-full bg-gs-dark border border-gs-border rounded-lg px-3 sm:px-4 py-2.5 sm:py-3 text-white placeholder-gs-text/40 focus:border-gs-accent focus:outline-none focus:ring-1 focus:ring-gs-accent text-base"
                        placeholder="例: 7203, 9984, 6758">
                </div>
                <button onclick="searchStock()" class="bg-gs-accent hover:bg-gs-accent/80 active:bg-gs-accent/60 text-white px-4 sm:px-6 py-2.5 sm:py-3 rounded-lg font-medium transition-colors whitespace-nowrap text-sm sm:text-base flex-shrink-0">
                    確認
                </button>
            </div>
            <div id="stockInfo" class="mt-2 hidden">
                <div class="flex items-center gap-2 text-xs sm:text-sm">
                    <span class="inline-block w-2 h-2 bg-green-400 rounded-full flex-shrink-0"></span>
                    <span id="stockName" class="text-white font-medium truncate"></span>
                    <span id="stockTicker" class="text-gs-text/60 flex-shrink-0"></span>
                </div>
            </div>
            <!-- クイックアクセス -->
            <div class="mt-3 flex flex-wrap gap-1.5">
                <span class="text-xs text-gs-text/40">例:</span>
                <button onclick="quickTicker('7203')" class="text-xs bg-gs-dark/80 text-gs-text/60 px-2 py-0.5 rounded hover:text-white transition-colors">7203 トヨタ</button>
                <button onclick="quickTicker('9984')" class="text-xs bg-gs-dark/80 text-gs-text/60 px-2 py-0.5 rounded hover:text-white transition-colors">9984 SBG</button>
                <button onclick="quickTicker('6758')" class="text-xs bg-gs-dark/80 text-gs-text/60 px-2 py-0.5 rounded hover:text-white transition-colors">6758 ソニー</button>
                <button onclick="quickTicker('7974')" class="text-xs bg-gs-dark/80 text-gs-text/60 px-2 py-0.5 rounded hover:text-white transition-colors">7974 任天堂</button>
            </div>
        </div>
    </section>

    <!-- 分析メニュー -->
    <section class="mb-6 sm:mb-10">
        <h2 class="text-white font-semibold text-base sm:text-lg mb-3 sm:mb-4">分析メニュー</h2>
        <div id="analyzerGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 sm:gap-4"></div>
    </section>

    <!-- パラメータ -->
    <div id="paramsSection" class="mb-6 sm:mb-8 hidden">
        <div class="bg-gs-card border border-gs-border rounded-xl p-4 sm:p-6">
            <h3 class="text-white font-semibold mb-3 sm:mb-4 text-sm sm:text-base" id="paramsTitle">パラメータ</h3>
            <div id="paramsContent" class="grid grid-cols-1 sm:grid-cols-3 gap-3 sm:gap-4"></div>
            <div class="mt-4">
                <button onclick="submitWithParams()" class="w-full sm:w-auto bg-gs-gold hover:bg-gs-gold/80 active:bg-gs-gold/60 text-gs-dark px-6 py-2.5 rounded-lg font-medium transition-colors text-base">
                    分析開始
                </button>
            </div>
        </div>
    </div>

    <!-- ローディング -->
    <div id="loading" class="hidden text-center py-12 sm:py-16">
        <div class="loader mx-auto mb-4"></div>
        <p class="text-gs-text/70 text-sm" id="loadingText">分析中...</p>
    </div>

    <!-- 結果 -->
    <div id="results" class="hidden fade-in"></div>
</main>

<!-- フッター -->
<footer class="border-t border-gs-border mt-12 sm:mt-16 py-4 sm:py-6">
    <div class="max-w-7xl mx-auto px-3 sm:px-4 text-center text-gs-text/40 text-[10px] sm:text-xs">
        <p>GSSS - Goldman Sachs Style Stock Screener</p>
        <p class="mt-1">投資は自己責任で行ってください。本ツールの分析結果は投資助言ではありません。</p>
        <p class="mt-1">データ: Yahoo Finance | CORSプロキシ経由</p>
    </div>
</footer>

<script>
function quickTicker(code) {
    document.getElementById('tickerInput').value = code;
    searchStock();
}
</script>
<script src="js/fetcher.js"></script>
<script src="js/analyzers.js"></script>
<script src="js/renderers.js"></script>
<script src="js/app.js"></script>
</body>
</html>
